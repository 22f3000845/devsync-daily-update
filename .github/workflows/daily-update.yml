name: Daily Repository Update

on:
  schedule:
    - cron: '30 18 * * *'   # Runs daily at 6:30 PM UTC (specific time)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "22f3000845@ds.study.iitm.ac.in"

      - name: Daily Commit Step - 22f3000845@ds.study.iitm.ac.in
        run: |
          echo "Last update: $(date)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily update: $(date)" || echo "No changes to commit"
          git push
